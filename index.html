<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,
initial-scale=1.0,
maximum-scale=1.0,
user-scalable=no">

<title>REPORT DAILY SHIFT</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;

  -webkit-user-select:none;
  -ms-user-select:none;
  user-select:none;

  -webkit-touch-callout:none;
}

body{
  background:#0F1115;
  padding:14px;
  color:#D8FFD8;
  touch-action:manipulation;
}

.container{
  max-width:520px;
  margin:auto;
}

.card{
  background:#171A21;
  border-radius:24px;
  padding:18px;
  border:1px solid #222831;

  box-shadow:
  0 0 20px rgba(0,255,120,0.08),
  0 0 40px rgba(255,0,80,0.05);
}

.title{
  text-align:center;
  font-size:24px;
  font-weight:900;
  color:#00FF88;
  letter-spacing:1px;
}

.sub{
  text-align:center;
  margin-top:6px;
  margin-bottom:22px;
  color:#8B949E;
  font-size:11px;
  letter-spacing:2px;
}

.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.form-group{
  margin-bottom:14px;
}

label{
  display:block;
  margin-bottom:7px;
  font-size:11px;
  font-weight:bold;
  color:#9CFFA7;
  letter-spacing:1px;
}

.input-wrap{
  position:relative;
}

.input{
  width:100%;
  height:50px;
  border:none;
  border-radius:15px;
  background:#11151C;
  padding:0 14px;
  font-size:13px;
  color:#E8FFE8;
  border:1px solid #2A313C;
  text-transform:uppercase;
}

.input:focus{
  outline:none;
  border:2px solid #00FF88;
  background:#0F1319;
}

.dropdown{
  position:absolute;
  top:56px;
  left:0;
  width:100%;
  background:#1B2029;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  display:none;
  z-index:999;
  max-height:180px;
  overflow-y:auto;
  border:1px solid #2A313C;
}

.dropdown-item{
  padding:12px 14px;
  cursor:pointer;
  transition:0.2s;
  text-transform:uppercase;
  color:#D8FFD8;
  font-size:13px;
}

.dropdown-item:hover{
  background:#00FF88;
  color:#000;
}

select.input{
  appearance:none;
  -webkit-appearance:none;
  -moz-appearance:none;
}

.upload-box{
  border:2px dashed #2F3844;
  border-radius:16px;
  padding:16px;
  background:#11151C;
}

.preview{
  margin-top:12px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.preview img{
  width:75px;
  height:75px;
  object-fit:cover;
  border-radius:12px;
  border:1px solid #2F3844;
}

.btn{
  width:100%;
  height:54px;
  border:none;
  border-radius:16px;

  background:linear-gradient(
  135deg,
  #00FF88,
  #00CC6A
  );

  color:#000;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  letter-spacing:1px;
  margin-top:10px;
}

.result{
  margin-top:18px;
  background:#11151C;
  border-radius:16px;
  padding:16px;
  white-space:pre-line;
  font-size:13px;
  line-height:1.5;
  text-transform:uppercase;
  border:1px solid #2A313C;
  color:#D8FFD8;
}

.footer{
  text-align:center;
  margin-top:20px;
  color:#7E8793;
  font-size:11px;
  letter-spacing:1px;
}

.add-btn{
  width:100%;
  height:46px;
  border:none;
  border-radius:14px;
  background:#1D2630;
  color:#00FF88;
  font-weight:bold;
  margin-bottom:16px;
  cursor:pointer;
  border:1px solid #2A313C;
}

.dynamic-box{
  margin-bottom:16px;
  padding:14px;
  border-radius:16px;
  background:#11151C;
  border:1px solid #2A313C;
}

</style>
</head>
<body>

<div class="container">

  <div class="card">

    <div class="title">
      DAILY SHIFT REPORT
    </div>

    <div class="sub">
      SMART DATA INPUT
    </div>

    <div id="phaseContainer">

      <div class="dynamic-box section">

        <div class="grid2">

          <!-- PHASE -->
          <div class="form-group">

            <label>NO. PHASE</label>

            <div class="input-wrap">

              <input type="text"
                     class="input auto-save phaseInput"
                     data-key="phaseData"
                     autocomplete="off"
                     placeholder="INPUT NO. PHASE">

              <div class="dropdown"></div>

            </div>

          </div>

          <!-- JENIS -->
          <div class="form-group">

            <label>JENIS PHASE</label>

            <select class="input jenisInput">

              <option>AWB</option>
              <option>NON AWB</option>
              <option>LIQUID</option>

            </select>

          </div>

        </div>

        <!-- TOTAL -->
        <div class="form-group">

          <label>TOTAL BAG</label>

          <input type="number"
                 class="input totalInput"
                 placeholder="INPUT TOTAL BAG">

        </div>

        <!-- NO LABEL -->
        <div class="form-group">

          <label>TOTAL BAG NO LABEL</label>

          <input type="number"
                 class="input noLabelInput"
                 placeholder="INPUT TOTAL BAG NO LABEL">

        </div>

      </div>

    </div>

    <!-- BUTTON TAMBAH -->
    <button class="add-btn"
            onclick="tambahSection()">

      + TAMBAH PHASE

    </button>

    <!-- INBOUND -->
    <div class="form-group">

      <label>INBOUND TOTAL UNIT</label>

      <input type="number"
             class="input"
             id="inbound"
             placeholder="INPUT INBOUND TOTAL UNIT">

    </div>

    <!-- TOTAL BAG -->
    <div class="form-group">

      <label>TOTAL BAG INBOUND</label>

      <input type="number"
             class="input"
             id="baginbound"
             placeholder="AUTO TOTAL"
             readonly>

    </div>

    <!-- TOTAL NO LABEL -->
    <div class="form-group">

      <label>TOTAL NO LABEL INBOUND</label>

      <input type="number"
             class="input"
             id="totalnolabel"
             placeholder="AUTO TOTAL"
             readonly>

    </div>

    <!-- FOTO -->
    <div class="form-group">

      <label>UPLOAD FOTO</label>

      <div class="upload-box">

        <input type="file"
               id="foto"
               multiple
               accept="image/*">

        <div class="preview"
             id="preview"></div>

      </div>

    </div>

    <!-- BUTTON -->
    <button class="btn"
            onclick="kirimWA()">

      KIRIM KE WHATSAPP

    </button>

    <!-- RESULT -->
    <div class="result"
         id="hasil"></div>

    <!-- FOOTER -->
    <div class="footer">
      ©2026 ZULFAHMI AFNULA. ALL RIGHTS RESERVED.
    </div>

  </div>

</div>

<script>

/* ================= BLOK COPY PASTE ================= */

document.addEventListener(
'copy',
e => e.preventDefault()
);

document.addEventListener(
'cut',
e => e.preventDefault()
);

document.addEventListener(
'paste',
e => e.preventDefault()
);

document.addEventListener(
'contextmenu',
e => e.preventDefault()
);

/* ================= FOTO ================= */

const foto =
document.getElementById('foto');

const preview =
document.getElementById('preview');

let filesDipilih = [];

foto.addEventListener('change',function(){

  filesDipilih=[...this.files];

  preview.innerHTML='';

  filesDipilih.forEach(file => {

    const reader =
    new FileReader();

    reader.onload=function(e){

      const img =
      document.createElement('img');

      img.src=e.target.result;

      preview.appendChild(img);

    }

    reader.readAsDataURL(file);

  });

});

/* ================= AUTO SAVE ================= */

function aktifkanDropdown(){

  const autoInputs =
  document.querySelectorAll('.auto-save');

  autoInputs.forEach(input => {

    const dropdown =
    input.parentElement.querySelector('.dropdown');

    function loadDropdown(filter=''){

      dropdown.innerHTML='';

      let data =
      JSON.parse(
      localStorage.getItem('phaseData')
      ) || [];

      data = data.filter(item =>
        item.toLowerCase()
        .includes(filter.toLowerCase())
      );

      if(data.length === 0){

        dropdown.style.display='none';
        return;

      }

      dropdown.style.display='block';

      data.forEach(item => {

        const div =
        document.createElement('div');

        div.className='dropdown-item';

        div.style.display='flex';
        div.style.justifyContent='space-between';
        div.style.alignItems='center';

        const span =
        document.createElement('span');

        span.innerText=item;

        span.style.flex='1';

        span.onclick=()=>{

          input.value=
          item.toUpperCase();

          dropdown.style.display='none';

          updatePreview();

        };

        const hapus =
        document.createElement('span');

        hapus.innerText='✕';

        hapus.style.color='#FF5C5C';
        hapus.style.fontWeight='bold';
        hapus.style.cursor='pointer';
        hapus.style.marginLeft='10px';

        hapus.onclick=(e)=>{

          e.stopPropagation();

          let data =
          JSON.parse(
          localStorage.getItem('phaseData')
          ) || [];

          data = data.filter(x => x !== item);

          localStorage.setItem(
            'phaseData',
            JSON.stringify(data)
          );

          loadDropdown(input.value);

        };

        div.appendChild(span);
        div.appendChild(hapus);

        dropdown.appendChild(div);

      });

    }

    input.addEventListener('focus',()=>{

      loadDropdown();

    });

    input.addEventListener('keyup',()=>{

      input.value =
      input.value.toUpperCase();

      loadDropdown(input.value);

      updatePreview();

    });

    input.addEventListener('blur',()=>{

      setTimeout(()=>{

        dropdown.style.display='none';

      },200);

      const value =
      input.value.trim().toUpperCase();

      if(value==='') return;

      let data =
      JSON.parse(
      localStorage.getItem('phaseData')
      ) || [];

      if(!data.includes(value)){

        data.unshift(value);

        localStorage.setItem(
          'phaseData',
          JSON.stringify(data)
        );

      }

    });

  });

}

aktifkanDropdown();

/* ================= TAMBAH SECTION ================= */

function tambahSection(){

  const container =
  document.getElementById('phaseContainer');

  const div =
  document.createElement('div');

  div.className='dynamic-box section';

  div.innerHTML = `

  <div class="grid2">

    <div class="form-group">

      <label>PHASE</label>

      <div class="input-wrap">

        <input type="text"
               class="input auto-save phaseInput"
               autocomplete="off"
               placeholder="INPUT PHASE">

        <div class="dropdown"></div>

      </div>

    </div>

    <div class="form-group">

      <label>JENIS</label>

      <select class="input jenisInput">

        <option>AWB</option>
        <option>NON AWB</option>
        <option>LIQUID</option>

      </select>

    </div>

  </div>

  <div class="form-group">

    <label>TOTAL BAG</label>

    <input type="number"
           class="input totalInput"
           placeholder="INPUT TOTAL BAG">

  </div>

  <div class="form-group">

    <label>BAG NO LABEL</label>

    <input type="number"
           class="input noLabelInput"
           placeholder="INPUT NO LABEL">

  </div>

  `;

  container.appendChild(div);

  aktifkanDropdown();

  aktifkanRealtime();

}

/* ================= AUTO TOTAL ================= */

function hitungTotal(){

  let totalBag = 0;
  let totalNoLabel = 0;

  document.querySelectorAll('.section')
  .forEach(section => {

    const total =
    parseInt(
    section.querySelector('.totalInput').value
    ) || 0;

    const nolabel =
    parseInt(
    section.querySelector('.noLabelInput').value
    ) || 0;

    totalBag += total;
    totalNoLabel += nolabel;

  });

  baginbound.value = totalBag;
  totalnolabel.value = totalNoLabel;

}

/* ================= REALTIME ================= */

function aktifkanRealtime(){

  const semuaInput =
  document.querySelectorAll(
  'input,select'
  );

  semuaInput.forEach(el => {

    el.addEventListener('input',()=>{

      if(el.type !== 'number' &&
         el.type !== 'file'){

        el.value =
        el.value.toUpperCase();

      }

      updatePreview();

    });

  });

}

aktifkanRealtime();

/* ================= PREVIEW ================= */

function updatePreview(){

  hitungTotal();

  let phaseText='';

  document.querySelectorAll('.section')
  .forEach(section => {

    const phase =
    section.querySelector('.phaseInput').value;

    const jenis =
    section.querySelector('.jenisInput').value;

    const total =
    section.querySelector('.totalInput').value;

    const nolabel =
    section.querySelector('.noLabelInput').value;

    phaseText +=
`PHASE ${phase} ${jenis}
TOTAL : ${total} BAG
NO LABEL : ${nolabel} BAG

`;

  });

  const hasil =
`REPORT DAILY SHIFT LIQUIDATION SEPATAN

${phaseText}
INBOUND UNIT : ${inbound.value} 🛻
TOTAL BAG INBOUND : ${baginbound.value} BAG
TOTAL NO LABEL : ${totalnolabel.value} BAG`;

  document.getElementById('hasil')
  .innerText = hasil;

}

updatePreview();

/* ================= KIRIM WA ================= */

async function kirimWA(){

  const text =
  document.getElementById('hasil')
  .innerText;

  if(filesDipilih.length > 0){

    if(navigator.share){

      try{

        await navigator.share({

          text:text,
          files:filesDipilih

        });

      }catch(err){

        alert('GAGAL KIRIM');

      }

    }else{

      alert(
      'BROWSER TIDAK SUPPORT KIRIM GAMBAR'
      );

    }

  }else{

    const url =
`https://wa.me/?text=${encodeURIComponent(text)}`;

    window.open(url,'_blank');

  }

}

</script>

</body>
</html>
